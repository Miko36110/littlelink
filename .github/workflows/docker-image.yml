name: littlelink-miko

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: alpine

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file /docker/Dockerfile --tag littlelink-miko:$(date +%s)
