<!DOCTYPE html>

<!-- theme-auto, theme-light, theme-dark -->
<html class="theme-auto" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Miko36110</title>
  <link rel="icon" type="image/x-icon" href="/images/avatar.png">
  <meta name="description" content="Miko36110's Socials｜MikoLabs">
  <meta name="keywords" content="Miko36110, MikoLabs">
  <meta rel="canonical" href="https://mikolabs.com">
  <meta name="author" content="Miko36110">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/brands.css">
  <link rel="stylesheet" href="css/brands-extended.css">
  <link rel="stylesheet" href="css/expandable-panel.css">
</head>

<body>

  <div class="container">
    <div class="column">

      <!-- avatar--rounded, avatar--soft, avatar--none -->
      <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Miko36110">

      <!-- name/brand -->
      <h1>
        <div>Miko36110</div>
      </h1>

      <!-- description -->
      <p>Almost all of my links are available here!</p>

      <!-- buttons -->
      <div class="button-stack" role="navigation">

        <!-- Discord - Expandable -->
        <div class="id-container" data-id-value="miko36110">
          <a class="button button-discord id-trigger" href="javascript:void(0)" role="button"><img class="icon"
              aria-hidden="true" src="images/icons/discord.svg" alt="Discord Logo">Discord</a>
          <div class="id-panel">
            <div class="id-panel__content">
              <p class="id-panel__text">Add me on Discord</p>
              <div class="id-panel__value">miko36110</div>
              <button class="id-copy">Copy Username</button>
            </div>
          </div>
        </div>

        <!-- Steam -->
        <a class="button button-steam" href="https://l.mikolabs.com/steam" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/steam.svg" alt="Steam Logo">Steam</a>

        <!-- Line -->
        <a class="button button-line" href="https://l.mikolabs.com/line" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/line.svg" alt="Line Logo">Line</a>

        <!-- Instagram -->
        <a class="button button-instagram" href="https://l.mikolabs.com/instagram" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg"
            alt="Instagram Logo">Instagram</a>

        <!-- X -->
        <a class="button button-x" href="https://l.mikolabs.com/twitter" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">Twitter</a>

        <!-- YouTube -->
        <a class="button button-yt" href="https://l.mikolabs.com/youtube" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube.svg"
            alt="YouTube Logo">YouTube</a>

        <!-- GitHub -->
        <a class="button button-github" href="https://l.mikolabs.com/github" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo">GitHub</a>

        <!-- Reddit -->
        <a class="button button-reddit" href="https://l.mikolabs.com/reddit" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/reddit.svg" alt="Reddit Logo">Reddit</a>

        <!-- Last.fm -->
        <a class="button button-last-fm" href="https://l.mikolabs.com/lastfm" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/last-fm.svg" alt="">Last.fm</a>

        <!-- Trakt -->
        <a class="button button-trakt" href="https://l.mikolabs.com/trakt" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons-extended/trakt.svg"
            alt="Trakt Logo">Trakt</a>

        <!-- Twitch -->
        <a class="button button-twitch" href="https://l.mikolabs.com/twitch" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/twitch.svg" alt="Twitch Logo">Twitch</a>

        <!-- osu!game -->
        <a class="button button-osu" href="https://l.mikolabs.com/osu" target="_blank" rel="noopener" role="button"><img
            class="icon" aria-hidden="true" src="images/icons-extended/osu.svg" alt="osu!game icon">osu!game</a>
        <br>
        <br>
        <p>MikoLabs Dashboard</p>

        <!-- MikoLabs -->
        <a class="button button-default" href="https://home.mikolabs.com" target="_blank" rel="noopener"
          role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg"
            alt="MikoLabs Icon">MikoLabs</a>

      </div>

      <!-- footer information -->
      <footer>
        <p>Miko36110 - 2026</p>
      </footer>

    </div>

  <script src="js/expandable-panel.js"></script>
  <script src="js/sensitive-content.js"></script>

</html>
